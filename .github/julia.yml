name: Julia Simulation

on:
  push:
    branches: [ main ]

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'

    - name: Install packages
      run: julia -e 'using Pkg; Pkg.instantiate(); Pkg.add(["Plots","FFTW","FFMPEG"])'

    - name: Run simulation
      run: julia wave_packet.jl